<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Lunchmoney</title>
<style>
  body { margin:0; background:#161311; color:#fff; font-family:-apple-system,Helvetica,Arial,sans-serif; display:flex; align-items:center; justify-content:center; min-height:100vh; text-align:center; }
  .wrap { max-width:560px; padding:40px 24px; }
  h1 { font-size:2.4rem; color:#D97B3F; margin-bottom:0.2em; }
  p { color:#cfcfcf; line-height:1.6; font-size:1.1rem; }
  .feature { color:#3F7D64; font-weight:600; }
  a { color:#D97B3F; }
  footer { margin-top:40px; font-size:0.85rem; color:#888; }

  @keyframes floatOrb {
    0%, 100% { transform: translate(0,0) scale(1); }
    50% { transform: translate(30px,-40px) scale(1.08); }
  }
  @keyframes fadeUp {
    from { opacity:0; transform: translateY(16px); }
    to { opacity:1; transform: translateY(0); }
  }
  .orb {
    position: fixed; top: -120px; right: -120px; width: 420px; height: 420px;
    background: radial-gradient(circle, #D97B3F55 0%, #D97B3F00 70%);
    filter: blur(10px); pointer-events: none; z-index: 0;
    animation: floatOrb 9s ease-in-out infinite;
  }
  .wrap { position: relative; z-index: 1; }
  h1 { animation: fadeUp 0.8s ease-out both; }
  p.tagline { animation: fadeUp 0.8s ease-out 0.15s both; }
  .feature { animation: fadeUp 0.8s ease-out both; transition: transform 0.25s ease; }
  .feature:nth-of-type(1) { animation-delay: 0.3s; }
  .feature:nth-of-type(2) { animation-delay: 0.45s; }
  .feature:hover { transform: translateY(-3px); }
  footer { animation: fadeUp 0.8s ease-out 0.6s both; }
</style>
</head>
<body>
<div class="orb"></div>
<div class="wrap">
  <h1>Lunchmoney</h1>
  <p>Track daily work-lunch spending versus brought-from-home savings.</p>
  <p class="feature">Log lunch cost or 'brought from home' each day</p>
  <p><a href="privacy.html">Privacy Policy</a> &middot; <a href="terms.html">Terms of Use</a></p>
  <footer>Contact: s0533495227@gmail.com</footer>
</div>
</body>
</html>
