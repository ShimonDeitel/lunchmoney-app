name: Lunchmoney
options:
  bundleIdPrefix: com.shimondeitel.lunchmoney
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Lunchmoney:
    type: application
    platform: iOS
    sources:
      - path: Lunchmoney
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.lunchmoney
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Lunchmoney/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  LunchmoneyTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: LunchmoneyTests
      - path: Lunchmoney.storekit
    dependencies:
      - target: Lunchmoney
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.lunchmoney.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  LunchmoneyUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: LunchmoneyUITests
    dependencies:
      - target: Lunchmoney
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.lunchmoney.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Lunchmoney:
    build:
      targets:
        Lunchmoney: all
        LunchmoneyTests: [test]
        LunchmoneyUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Lunchmoney.storekit
    test:
      config: Debug
      storeKitConfiguration: Lunchmoney.storekit
      targets:
        - LunchmoneyTests
        - LunchmoneyUITests
    archive:
      config: Release
